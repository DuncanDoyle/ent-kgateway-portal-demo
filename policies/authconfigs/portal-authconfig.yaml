apiVersion: extauth.solo.io/v1
kind: AuthConfig
metadata:
  name: portal
  namespace: kgateway-system
spec:
  configs:
  - oauth2:
      oidcAuthorizationCode:
        appUrl: http://developer.example.com
        callbackPath: /v1/login
        clientId: portal-client
        clientSecretRef:
          name: oauth
          namespace: kgateway-system
        headers:
          idTokenHeader: id_token
        issuerUrl: http://keycloak.example.com/realms/kgateway-demo/
        logoutPath: /v1/logout
        scopes:
        - email
        session:
          failOnFetchFailure: true
          # Needed because we host this demo on http instead of https.
          cookieOptions:
            notSecure: true
          redis:
            cookieName: keycloak-session
            options:
              host: ext-cache-enterprise-kgateway:6379