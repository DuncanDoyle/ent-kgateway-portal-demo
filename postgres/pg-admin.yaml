apiVersion: apps/v1
kind: Deployment
metadata:
  name: pgadmin
  namespace: kgateway-system
spec:
  replicas: 1
  selector:
    matchLabels:
      app: pgadmin
  template:
    metadata:
      labels:
        app: pgadmin
    spec:
      containers:
        - name: pgadmin
          image: dpage/pgadmin4:latest
          ports:
            - containerPort: 80
          env:
            - name: PGADMIN_DEFAULT_EMAIL
              value: "user@email.com"
            - name: PGADMIN_DEFAULT_PASSWORD
              value: "pass"
          volumeMounts:
            - name: pgadmin-config-volume
              mountPath: /pgadmin4/servers.json
              subPath: servers.json
      volumes:
        - name: pgadmin-config-volume
          configMap:
            name: pgadmin-config
---
apiVersion: v1
kind: Service
metadata:
  name: pgadmin
  namespace: kgateway-system
spec:
  type: ClusterIP
  ports:
    - port: 8080
      targetPort: 80
  selector:
    app: pgadmin
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: pgadmin-config
  namespace: kgateway-system
data:
  servers.json: |
    {
      "Servers": {
        "1": {
          "Name": "Portal DB",
          "Group": "Servers",
          "Host": "portal-postgres.kgateway-system.svc.cluster.local",
          "Port": 5432,
          "MaintenanceDB": "db",
          "Username": "user",
          "Password": "pass",
          "SSLMode": "disable",
          "Comment": "Automatically added server"
        }
      }
    }