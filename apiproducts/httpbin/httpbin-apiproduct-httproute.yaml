apiVersion: gateway.networking.k8s.io/v1beta1
kind: HTTPRoute
metadata:
  name: httpbin-apiproduct
  namespace: httpbin
  labels:
    app: apis
  annotations:
    delegation.kgateway.dev/inherit-parent-matcher: "true"
spec:
  rules:
    - matches:  
      - path:
          type: PathPrefix
          value: /
        # method: GET
      backendRefs:
      - name: httpbin
        namespace: httpbin
        port: 8000