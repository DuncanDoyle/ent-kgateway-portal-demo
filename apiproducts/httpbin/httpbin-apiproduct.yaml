apiVersion: portal.solo.io/v1alpha1
kind: ApiProduct
metadata:
  name: httpbin
  namespace: httpbin
spec:
  id: httpbin-svc
  displayName: HTTPBin Service v1
  customMetadata:
    image: <url>
    pii-sensitive: "true"
    api-category: "demo"
  versions:
